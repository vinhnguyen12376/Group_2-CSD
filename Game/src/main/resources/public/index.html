<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler - Advanced Edition</title>
    <!-- Favicon -->
    <link rel="icon" href="/conan.jpg" type="image/jpeg">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;600;900&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --panel-dark: #0f0f12;
            --accent-red: #ff3e3e;
            --accent-blue: #00e5ff;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            overflow: hidden;
        }

        /* PREMIUM SIDEBAR */
        #sidebar {
            width: 320px;
            background: #0a0a0c;
            border-right: 1px solid #1a1a1e;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .brand {
            font-family: 'Lora', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--accent-red);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #ff3e3e, #8a0000);
            background-clip: text;
            /* Fix compatibility */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .conan-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--accent-red);
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.3);
            object-fit: cover;
        }

        .stat-group {
            background: #121215;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #1e1e24;
        }

        .hp-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .hp-bar {
            height: 8px;
            background: #1c1c22;
            border-radius: 4px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3e3e, #ff8080);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.4);
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* MAIN DASHBOARD */
        #main {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: radial-gradient(circle at 50% 0%, #15151a 0%, #050505 100%);
        }

        .room-display {
            background: rgba(15, 15, 18, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #1e1e24;
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-tag {
            font-family: 'Lora', serif;
            font-size: 1.5rem;
            color: var(--accent-blue);
        }

        .status-pill {
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pill-safe {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .pill-locked {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        #console {
            flex-grow: 1;
            background: #08080a;
            border: 1px solid #1a1a1e;
            border-radius: 16px;
            padding: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #d4d4d8;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-entry {
            padding: 4px 0;
            border-left: 2px solid transparent;
            padding-left: 12px;
        }

        .log-sys {
            color: #52525b;
            font-style: italic;
        }

        .log-move {
            border-color: var(--accent-blue);
            color: #e4e4e7;
        }

        .log-atk {
            border-color: var(--accent-red);
            color: #fca5a5;
        }

        .log-win {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border-radius: 4px;
            padding: 12px;
        }

        /* INTERACTIVE GRID */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }

        .btn-rpg {
            height: 56px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.2s;
            border: 1px solid #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-room {
            background: #121215;
            color: #a1a1aa;
        }

        .btn-room:hover:not(:disabled) {
            background: #18181b;
            color: white;
            transform: translateY(-2px);
            border-color: #3f3f46;
        }

        .btn-room.active {
            background: var(--accent-blue);
            color: black;
            border: none;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        .btn-hero {
            background: var(--accent-red);
            color: white;
            border: none;
            grid-column: span 3;
        }

        .btn-hero:hover:not(:disabled) {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(255, 62, 62, 0.3);
        }

        .btn-util {
            background: #2a9d8f;
            color: white;
            border: none;
            grid-column: span 3;
        }

        /* INVENTORY */
        .inv-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .inv-item {
            background: #121215;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #1e1e24;
            transition: border-color 0.3s;
        }

        .spooky-text {
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 900;
            color: #ff3e3e;
            letter-spacing: 2px;
            font-size: 3.2rem;
            text-shadow: 0 0 10px rgba(255, 62, 62, 0.8), 2px 2px 5px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2001;
            text-transform: uppercase;
        }

        /* Countdown */
        #countdown-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
            overflow: hidden;
        }

        #fire-video {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            object-fit: cover;
            z-index: 1999;
            opacity: 0.8;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .splash-content {
            z-index: 2001;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        /* MINI MAP STYLES */
        #minimap-card {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .map-title {
            font-family: 'Lora', serif;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            text-align: center;
            opacity: 0.7;
        }

        .map-node {
            fill: #222;
            stroke: var(--border-color);
            stroke-width: 2;
            transition: all 0.3s;
        }

        .map-node.active {
            fill: var(--accent-red) !important;
            stroke: #fff;
            filter: drop-shadow(0 0 5px var(--accent-red));
        }

        .map-node.path {
            fill: #0dcaf0;
            stroke: #fff;
            stroke-width: 2;
            filter: drop-shadow(0 0 8px #0dcaf0);
        }

        .map-edge {
            stroke: #444;
            stroke-width: 2;
        }

        .map-edge.path {
            stroke: #0dcaf0;
            stroke-width: 3;
            stroke-dasharray: 5;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -10;
            }
        }

        .map-text {
            fill: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
        }

        .btn-start {
            background: linear-gradient(135deg, #ff3e3e 0%, #8a0000 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Lora', serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .btn-start:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 62, 62, 0.7);
            filter: brightness(1.2);
        }

        .btn-start img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="countdown-overlay">
        <video id="fire-video" src="/lửa cháy.mp4" autoplay loop muted playsinline></video>
        <div class="splash-content" id="splash-initial">
            <img src="/conan.jpg" alt="Conan Logo"
                style="width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent-red); margin-bottom: 30px; box-shadow: 0 0 30px rgba(255, 62, 62, 0.5); object-fit: cover; animation: pulse 2s infinite;">
            <button class="btn-start" onclick="beginDungeon()">
                <img src="/conan.jpg" alt="Small Conan">
                BẮT ĐẦU THÁM HIỂM
            </button>
        </div>

        <div class="splash-content hidden" id="splash-countdown">
            <img src="/conan.jpg" alt="Conan Logo"
                style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent-red); margin-bottom: 20px; box-shadow: 0 0 20px rgba(255, 62, 62, 0.4); object-fit: cover;">
            <div class="spooky-text mb-4 text-center">ĐANG ĐI VÀO HẦM NGỤC...</div>
            <div id="countdown-num"
                style="font-size: 8rem; font-family: 'Lora'; color: var(--accent-red); text-shadow: 0 0 30px rgba(255, 62, 62, 0.5); z-index: 2001; font-weight: 900;">
                5</div>
        </div>
    </div>

    <div id="sidebar">
        <div class="brand">CONAN</div>
        <img src="/conan.jpg" alt="Conan" class="conan-avatar">

        <div class="stat-group">
            <div class="hp-header">
                <span>DẤU HIỆU SINH TỒN</span>
                <span id="hp-txt">100%</span>
            </div>
            <div class="hp-bar">
                <div id="hp-fill" class="hp-fill" style="width: 100%;"></div>
            </div>
        </div>

        <h6 class="text-dim mb-3" style="font-weight: 800; font-size: 0.7rem; letter-spacing: 2px;">VẬT PHẨM SỞ HỮU</h6>
        <div id="inventory" class="inv-list"></div>
    </div>

    <div id="main">
        <!-- MINI MAP -->
        <div id="minimap-card">
            <div class="map-title">HỆ THỐNG HẦM NGỤC</div>
            <svg id="minimap-svg" width="100%" height="110" viewBox="0 0 400 120">
                <g id="map-edges"></g>
                <g id="map-nodes"></g>
            </svg>
        </div>

        <div class="room-display">
            <div>
                <div class="text-dim small mb-1">VỊ TRÍ HIỆN TẠI</div>
                <div class="current-tag" id="room-name">PHÒNG 7</div>
            </div>
            <div id="room-status" class="status-pill pill-safe">AN TOÀN</div>
        </div>

        <div id="console"></div>

        <div class="action-grid">
            <button class="btn btn-rpg btn-room" id="r7" onclick="move(7)">7</button>
            <button class="btn btn-rpg btn-room" id="r3" onclick="move(3)">3</button>
            <button class="btn btn-rpg btn-room" id="r8" onclick="move(8)">8</button>
            <button class="btn btn-rpg btn-room" id="r1" onclick="move(1)">1</button>
            <button class="btn btn-rpg btn-room" id="r4" onclick="move(4)">4</button>
            <button class="btn btn-rpg btn-room" id="r2" onclick="move(2)">2</button>


            <button class="btn btn-rpg btn-hero" onclick="attack()">⚔️ ĐỒNG HỒ GÂY MÊ</button>
            <button class="btn btn-rpg btn-util" id="btn-bfs" onclick="findExit()" disabled>🗺️ KÍCH HOẠT BẢN
                ĐỒ</button>
        </div>

        <div id="encounter-container"
            style="position: fixed; right: 20px; top: 20px; z-index: 1000; display: none; transition: opacity 0.5s;">
            <div class="card bg-transparent border-0" style="width: 250px; position: relative;">
                <img id="encounter-img" src="" class="card-img"
                    style="height: 250px; width: 250px; object-fit: cover; border-radius: 16px; border: 3px solid var(--accent-blue); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <div id="encounter-overlay"
                    style="position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 10px 15px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 50%, transparent 100%); border-radius: 0 0 16px 16px; text-align: center;">
                    <div id="encounter-badge-container">
                        <span class="badge bg-danger p-2 mb-1" id="encounter-badge"
                            style="white-space: normal; line-height: 1.4; border-radius: 8px; font-weight: 800; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);">NGUY
                            HIỂM!</span>
                    </div>
                    <div id="encounter-name" class="fw-bold mt-1 text-white"
                        style="word-break: break-word; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-size: 0.9rem; letter-spacing: 0.5px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH & TRẠNG THÁI (STATE) ---
        let isGameReady = false;
        let activePath = [];

        const MAP_CONFIG = {
            positions: {
                7: { x: 200, y: 15 },
                3: { x: 120, y: 45 },
                8: { x: 280, y: 45 },
                1: { x: 60, y: 75 },
                4: { x: 180, y: 75 },
                2: { x: 90, y: 105 }
            },
            edges: [
                [7, 3], [7, 8], [3, 1], [3, 4], [1, 2]
            ],
            assets: {
                'Nobita': 'nobita.jpg', 'Chaien': 'chaien.jpg',
                'Suneo': 'Suneo.jpg', 'Shizuka': 'Shizuka.jpg',
                'Doraemon': 'doraemon.jpg', 'Chaiko': 'chaiko.jpg',
                'Tamako': 'tamako.jpg', 'Nobisuke': 'Nobisuke.jpg',
                'Dekhisugi': 'Dekhisugi.jpg'
            }
        };

        // --- GIAO DIỆN (UI RENDERING) ---

        function drawMiniMap(currentRoomId) {
            const nodesGroup = document.getElementById('map-nodes');
            const edgesGroup = document.getElementById('map-edges');
            nodesGroup.innerHTML = '';
            edgesGroup.innerHTML = '';

            // Vẽ các đường nối (Edges)
            MAP_CONFIG.edges.forEach(edge => {
                const u = MAP_CONFIG.positions[edge[0]];
                const v = MAP_CONFIG.positions[edge[1]];
                if (!u || !v) return;

                const isPath = activePath.includes(edge[0]) && activePath.includes(edge[1]);
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", u.x); line.setAttribute("y1", u.y);
                line.setAttribute("x2", v.x); line.setAttribute("y2", v.y);
                line.className.baseVal = isPath ? "map-edge path" : "map-edge";
                edgesGroup.appendChild(line);
            });

            // Vẽ các phòng (Nodes)
            for (const id in MAP_CONFIG.positions) {
                const pos = MAP_CONFIG.positions[id];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", pos.x); circle.setAttribute("cy", pos.y);
                circle.setAttribute("r", 10);
                
                let nodeClass = "map-node";
                if (id == currentRoomId) nodeClass += " active";
                if (activePath.includes(parseInt(id))) nodeClass += " path";
                circle.className.baseVal = nodeClass;

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", pos.x); text.setAttribute("y", pos.y + 4);
                text.setAttribute("text-anchor", "middle");
                text.className.baseVal = "map-text";
                text.style.fontSize = "8px";
                text.textContent = id;

                g.appendChild(circle);
                g.appendChild(text);
                nodesGroup.appendChild(g);
            }
        }

        function showMonsterArrival(name) {
            const container = document.getElementById('encounter-container');
            const img = document.getElementById('encounter-img');
            const nameLabel = document.getElementById('encounter-name');
            const fileName = MAP_CONFIG.assets[name];

            if (fileName) {
                img.src = "/" + fileName;
                const b = document.getElementById('encounter-badge');

                if (name === 'Doraemon') {
                    nameLabel.innerText = "CHẠM TRÁN: BOSS DORAEMON";
                    b.className = "badge bg-danger fs-6 p-2 w-100";
                    b.innerText = "CỰC KÌ NGUY HIỂM! HÃY CHÚ Ý CẨN THẬN!";
                    img.style.borderColor = "var(--accent-red)";
                    container.style.filter = "drop-shadow(0 0 20px rgba(255, 62, 62, 0.6))";
                } else {
                    nameLabel.innerText = "CHẠM TRÁN: " + name.toUpperCase();
                    b.className = "badge bg-warning text-dark p-2";
                    b.innerText = "NGUY HIỂM!";
                    img.style.borderColor = "var(--accent-blue)";
                    container.style.filter = "none";
                }
                container.style.display = 'block';
                setTimeout(() => container.style.opacity = '1', 10);
            }
        }

        function log(msg, cls) {
            const c = document.getElementById('console');
            const d = document.createElement('div');
            d.className = 'log-entry ' + cls;
            d.innerText = "> " + msg;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        // --- TƯƠNG TÁC API ---

        async function update() {
            if (!isGameReady) return;
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                drawMiniMap(data.currentRoom);

                if (data.firstMonsterName) showMonsterArrival(data.firstMonsterName);
                else document.getElementById('encounter-container').style.display = 'none';

                document.getElementById('hp-txt').innerText = data.hp + "%";
                document.getElementById('hp-fill').style.width = data.hp + "%";
                document.getElementById('room-name').innerText = "PHÒNG " + data.currentRoom;

                const statusPill = document.getElementById('room-status');
                statusPill.innerText = data.isLocked ? "ĐANG KHÓA" : "AN TOÀN";
                statusPill.className = "status-pill " + (data.isLocked ? "pill-locked" : "pill-safe");

                const inv = document.getElementById('inventory');
                inv.innerHTML = '';
                data.inventory.forEach(item => {
                    const li = document.createElement('li');
                    li.className = "inv-item";
                    let icon = "📦";
                    if (item.name.includes("Đồng hồ")) icon = "⌚";
                    else if (item.name.includes("Bản đồ")) icon = "🗺️";
                    else if (item.name.includes("Chìa")) icon = "🔑";
                    li.innerHTML = `<span>${icon}</span> <span>${item.name}</span>`;
                    inv.appendChild(li);
                });

                document.getElementById('btn-bfs').disabled = !data.hasMap;
                document.querySelectorAll('.btn-room').forEach(b => {
                    b.classList.remove('active');
                    b.disabled = !isGameReady;
                    if (b.id === `r${data.currentRoom}`) b.classList.add('active');
                });
            } catch (e) { console.error("Update failed", e); }
        }

        async function move(id) {
            if (!isGameReady) return;
            let url = '/api/move?target=' + id;
            try {
                let res = await fetch(url, { method: 'POST' });
                let txt = await res.text();

                if (txt.startsWith("CONFIRM|")) {
                    if (confirm(txt.split("|")[1])) {
                        alert("Hãy sử dụng ô 'TRA CỨU BST' ở dưới!");
                        return;
                    }
                    res = await fetch(url + '&force=true', { method: 'POST' });
                    txt = await res.text();
                }

                log(txt.includes("|") ? txt.split("|")[1] : txt, 'log-move');
                update();
            } catch (e) { log("Lỗi di chuyển", "log-sys"); }
        }

        async function attack() {
            if (!isGameReady) return;
            const res = await fetch('/api/attack', { method: 'POST' });
            log(await res.text(), 'log-atk');
            update();
        }

        async function findExit() {
            const res = await fetch('/api/find-exit');
            const result = await res.text();
            log(result, 'log-move');

            if (result.toLowerCase().includes("lộ trình")) {
                const parts = result.split(":");
                if (parts.length > 1) {
                    const pathStr = parts[1].trim();
                    const newPath = pathStr.split(" -> ").map(s => parseInt(s.trim())).filter(n => !isNaN(n));
                    // Accumulate paths: using Set to ensure unique Room IDs
                    activePath = [...new Set([...activePath, ...newPath])];
                    update();
                }
            }
        }

        async function searchBST() {
            const id = document.getElementById('bst-search').value;
            if (!id) return;
            const res = await fetch('/api/monster/' + id);
            log("BST: " + await res.text(), 'log-sys');
        }

        // --- KHỞI TẠO & HIỆU ỨNG ---

        function beginDungeon() {
            document.getElementById('splash-initial').classList.add('hidden');
            document.getElementById('splash-countdown').classList.remove('hidden');
            startSequence();
        }

        function startSequence() {
            let count = 5;
            const numElem = document.getElementById('countdown-num');
            const overlay = document.getElementById('countdown-overlay');
            const interval = setInterval(() => {
                count--;
                if (count >= 0) numElem.innerText = count;
                else {
                    clearInterval(interval);
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        isGameReady = true;
                        log("CONAN ĐÃ SẴN SÀNG THÁM HIỂM!", "log-win");
                        update();
                    }, 500);
                }
            }, 1000);
        }

        window.onload = () => { };
        setInterval(update, 3000);
    </script>
</body>

</html>
